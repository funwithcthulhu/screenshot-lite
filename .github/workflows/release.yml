name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows:
    name: Windows package
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test --all-features
      - name: Package
        shell: pwsh
        run: |
          $packageVersion = $env:GITHUB_REF_NAME -replace '^v', ''
          .\scripts\package-windows.ps1 -Version $packageVersion
      - name: Publish release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $version = $env:GITHUB_REF_NAME
          $zip = "target\dist\shotlite-$version-windows-x86_64.zip"
          $notes = @"
          Windows package for shotlite $version.

          Interactive region selection and tray mode are currently Windows-only.
          Clipboard and capture support depend on the local desktop/session.
          "@
          gh release create $version $zip --title "shotlite $version" --notes $notes --verify-tag
